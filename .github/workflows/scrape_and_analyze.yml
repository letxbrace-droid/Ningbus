name: Scrape & Analyze Meta Ads

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche keyword to scrape (leave empty for all niches in config)"
        required: false
        default: ""
      country:
        description: "Country code (FR, US, GB...)"
        required: false
        default: "FR"
      max_ads:
        description: "Max ads per niche"
        required: false
        default: "100"

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt --no-cache-dir

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Check imports
        run: python -c "import groq, aiohttp, yaml, playwright; print('All imports OK')"

      - name: Run scraper
        env:
          BRIGHT_DATA_TOKEN: ${{ secrets.BRIGHT_DATA_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.1-70b-versatile' }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          NICHE_OVERRIDE: ${{ github.event.inputs.niche }}
          COUNTRY_OVERRIDE: ${{ github.event.inputs.country }}
          MAX_ADS: ${{ github.event.inputs.max_ads || '100' }}
        run: |
          if [ -n "$NICHE_OVERRIDE" ]; then
            python -m scraper.main --niche "$NICHE_OVERRIDE" --country "${COUNTRY_OVERRIDE:-FR}" --max-ads "${MAX_ADS:-100}"
          else
            python -m scraper.main --country "${COUNTRY_OVERRIDE:-FR}" --max-ads "${MAX_ADS:-100}"
          fi
          # Fallback: if scraping returned 0 ads, generate demo data so dashboard stays populated
          TOTAL=$(python -c "import json; d=json.load(open('data/latest_analysis.json')); print(d.get('total_ads',0))" 2>/dev/null || echo "0")
          if [ "$TOTAL" = "0" ]; then
            echo "⚠️  Scraping returned 0 ads (Meta blocking) — injecting demo data"
            python generate_demo.py
          else
            echo "✅ Real ads scraped: $TOTAL"
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: auto-update scrape data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_number }}
          path: "*.log"
          retention-days: 7
