<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RATP Cap Saclay — Suivi des défauts</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN SYSTEM
       ── Palette ──────────────────────────────────────────────────
         Navy  #2d2f7e  identité, CTA primaire, nav active
         Teal  #2ec4b6  accent, actions secondaires, focus ring
         Vert  #16a34a  disponible / réparé
         Rouge #dc2626  bloquant / erreur
         Orange #ea580c gênant / avertissement
         Jaune #ca8a04  mineur
         Violet #7c3aed récurrent
       ── Échelle typo (base 15 px) ─────────────────────────────────
         xl    1.15rem  titres de section
         lg    1rem     titre de carte
         md    .9rem    corps principal
         sm    .83rem   méta, labels
         xs    .75rem   badges, compteurs
         min   .72rem   jamais en dessous (≈ 10.8 px)
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --navy:     #2d2f7e;
      --navy-dk:  #23257a;
      --teal:     #2ec4b6;
      --teal-dk:  #23a99c;
      --teal-lt:  #e6faf8;
      --vert:     #16a34a;
      --vert-lt:  #dcfce7;
      --rouge:    #dc2626;
      --rouge-lt: #fee2e2;
      --orange:   #ea580c;
      --orange-lt:#ffedd5;
      --jaune:    #ca8a04;
      --violet:   #7c3aed;
      --bg:       #f0f3f8;
      --surface:  #ffffff;
      --border:   #dde3ed;
      --text:     #1a2234;
      --text-2:   #5a6a85;
      --text-3:   #9baabb;
      --r-sm:     6px;
      --r-md:     10px;
      --r-lg:     14px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
      --shadow-md: 0 2px 8px rgba(0,0,0,.08), 0 4px 20px rgba(0,0,0,.05);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════
       EN-TÊTE STICKY — layout 2 lignes mobile
    ═══════════════════════════════════════ */
    header {
      background: #fff;
      border-bottom: 3px solid var(--teal);
      box-shadow: 0 2px 10px rgba(0,0,0,.09);
      position: sticky; top: 0; z-index: 200;
      /* Grille : 1 ligne bureau, 2 lignes mobile */
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto;
      align-items: center;
      gap: 0 16px;
      padding: 0 24px;
      min-height: 62px;
    }
    /* Logo — colonne 1 */
    .logo-header { height: 34px; width: auto; display: block; grid-column: 1; }
    /* Compteurs + nom — colonne 2 */
    .header-mid  { grid-column: 2; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    /* Nav — colonne 3 */
    .nav-roles   { grid-column: 3; display: flex; gap: 4px; }

    /* ── Compteurs ── */
    .compteurs { display: flex; gap: 6px; flex-wrap: nowrap; }
    .cpt {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700; letter-spacing: .02em;
      white-space: nowrap;
    }
    .cpt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cpt.dispo  { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .cpt.dispo .cpt-dot  { background: var(--vert); }
    .cpt.bloque { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .cpt.bloque .cpt-dot { background: var(--rouge); }
    .cpt.repair { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .cpt.repair .cpt-dot { background: var(--orange); }

    /* ── Champ nom ── */
    .champ-nom {
      display: flex; align-items: center; gap: 6px;
      font-size: .83rem; color: var(--text-2); margin-left: auto;
    }
    .champ-nom svg { flex-shrink: 0; color: var(--text-3); }
    .champ-nom input {
      padding: 5px 10px; border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: .83rem; color: var(--text); background: var(--bg);
      width: 140px; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .champ-nom input:focus {
      border-color: var(--teal); box-shadow: 0 0 0 3px rgba(46,196,182,.14);
    }

    /* ── Onglets de rôle ── */
    .nav-roles button {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border: 1.5px solid var(--border);
      background: transparent; color: var(--text-2);
      border-radius: var(--r-sm); cursor: pointer;
      font-size: .83rem; font-weight: 600;
      transition: all .15s; white-space: nowrap;
      min-height: 36px;
    }
    .nav-roles button svg { flex-shrink: 0; }
    .nav-roles button:hover  { border-color: var(--navy); color: var(--navy); background: #f0f0fa; }
    .nav-roles button.actif  { background: var(--navy); color: #fff; border-color: var(--navy); }
    /* Texte caché sur petit écran — voir media query */
    .nav-txt { display: inline; }

    /* ═══════════════════════════════════════
       CONTENU PRINCIPAL
    ═══════════════════════════════════════ */
    main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

    .vue { display: none; }
    .vue.active { display: block; animation: fadeIn .18s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

    .section-titre {
      font-size: 1.05rem; font-weight: 700; color: var(--navy);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-titre::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 24px;
      box-shadow: var(--shadow-md); margin-bottom: 16px;
    }

    /* ═══════════════════════════════════════
       FORMULAIRE CHAUFFEUR
    ═══════════════════════════════════════ */
    .fg { margin-bottom: 18px; }
    .fg label {
      display: block; font-size: .75rem; font-weight: 700;
      color: var(--text-2); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .fg label .opt {
      font-weight: 400; text-transform: none; letter-spacing: 0;
      font-size: .78rem; color: var(--text-3);
    }
    .fg input, .fg select, .fg textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: .95rem; color: var(--text); background: #fff;
      outline: none; transition: border-color .15s, box-shadow .15s;
      min-height: 44px;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus {
      border-color: var(--teal); box-shadow: 0 0 0 3px rgba(46,196,182,.14);
    }
    .fg textarea { resize: vertical; min-height: 82px; }

    /* N° de bus — mis en valeur */
    .num-bus-wrap { position: relative; }
    .num-bus-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 1.05rem; pointer-events: none;
    }
    #num-bus { padding-left: 42px; font-size: 1.1rem; font-weight: 800; letter-spacing: .08em; }

    /* Boutons de gravité */
    .gravite-opts { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .gravite-opts label {
      display: flex; flex-direction: column; align-items: center;
      gap: 5px; padding: 14px 6px;
      border: 2px solid var(--border); border-radius: var(--r-md);
      cursor: pointer; font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      transition: all .15s; user-select: none; color: var(--text-2);
      min-height: 80px; justify-content: center;
    }
    .gravite-opts input[type="radio"] { display: none; }
    .grav-icon { font-size: 1.6rem; line-height: 1; }
    .gravite-opts label:has([value="bloquant"]:checked) {
      border-color: var(--rouge); background: var(--rouge-lt); color: var(--rouge);
      box-shadow: 0 0 0 3px rgba(220,38,38,.1);
    }
    .gravite-opts label:has([value="gênant"]:checked) {
      border-color: var(--orange); background: var(--orange-lt); color: var(--orange);
      box-shadow: 0 0 0 3px rgba(234,88,12,.1);
    }
    .gravite-opts label:has([value="mineur"]:checked) {
      border-color: var(--jaune); background: #fefce8; color: var(--jaune);
      box-shadow: 0 0 0 3px rgba(202,138,4,.1);
    }
    .gravite-opts label:hover:not(:has(:checked)) { border-color: var(--text-3); background: #f8fafc; }

    /* Bandeau horodatage automatique */
    .meta-auto {
      display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
      padding: 10px 14px; background: var(--bg); border-radius: var(--r-sm);
      font-size: .83rem; color: var(--text-2); margin-bottom: 18px;
    }
    .meta-auto span { display: inline-flex; align-items: center; gap: 5px; }

    /* Bouton principal (CTA) — navy = identité */
    .btn-primary {
      width: 100%; padding: 13px; background: var(--navy); color: #fff;
      border: none; border-radius: var(--r-sm); font-size: 1rem; font-weight: 700;
      cursor: pointer; letter-spacing: .02em;
      transition: background .15s, transform .1s, box-shadow .15s;
      min-height: 48px;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--navy-dk); transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(45,47,126,.3);
    }
    .btn-primary:active:not(:disabled) { transform: none; box-shadow: none; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

    /* Alertes inline */
    .alerte {
      padding: 12px 16px; border-radius: var(--r-sm);
      font-size: .88rem; font-weight: 600;
      margin-bottom: 16px; line-height: 1.5; display: none;
    }
    .alerte.succes { background: #f0fdf4; border: 1.5px solid #86efac; color: #15803d; display: block; }
    .alerte.erreur { background: #fef2f2; border: 1.5px solid #fca5a5; color: #b91c1c; display: block; }
    .alerte.hidden { display: none !important; }

    /* ═══════════════════════════════════════
       BADGES SÉMANTIQUES
    ═══════════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 9px; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
      white-space: nowrap; letter-spacing: .02em;
    }
    .badge.bloquant  { background: var(--rouge-lt); color: var(--rouge);  border: 1px solid #fca5a5; }
    .badge.genant    { background: var(--orange-lt);color: var(--orange); border: 1px solid #fdba74; }
    .badge.mineur    { background: #fefce8;          color: var(--jaune); border: 1px solid #fde047; }
    .badge.recurrent { background: #f5f3ff;          color: var(--violet);border: 1px solid #c4b5fd; }
    .badge.s-ouvert  { background: var(--rouge-lt); color: #b91c1c; }
    .badge.s-en_cours{ background: #fffbeb;          color: #92400e; }
    .badge.s-reparé  { background: var(--vert-lt);  color: #15803d; }
    .badge.s-piece   { background: #f5f3ff;          color: #5b21b6; }

    /* ═══════════════════════════════════════
       VUE ATELIER — cartes défaut
    ═══════════════════════════════════════ */
    .filtres-bar {
      display: flex; gap: 10px; margin-bottom: 20px;
      flex-wrap: wrap; align-items: center;
    }
    .filtres-bar input, .filtres-bar select {
      padding: 8px 12px; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); font-size: .85rem;
      background: #fff; color: var(--text); outline: none;
      transition: border-color .15s; min-height: 40px;
    }
    .filtres-bar input { width: 160px; }
    .filtres-bar input:focus, .filtres-bar select:focus { border-color: var(--teal); }

    /* Carte défaut */
    .dcard {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 16px 18px;
      box-shadow: var(--shadow-sm); margin-bottom: 10px;
      transition: box-shadow .15s;
    }
    .dcard:hover { box-shadow: var(--shadow-md); }
    .dcard.bloquant { border-left: 5px solid var(--rouge); }
    .dcard.genant   { border-left: 5px solid var(--orange); }
    .dcard.mineur   { border-left: 5px solid var(--jaune); }

    .dhead {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    /* Pastille numéro de bus */
    .dbus {
      display: inline-block; font-size: .72rem; font-weight: 800;
      color: var(--navy); background: #eef0fa;
      padding: 2px 8px; border-radius: 4px; margin-bottom: 4px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .dtitle { font-size: .95rem; font-weight: 700; color: var(--text); line-height: 1.3; }
    .dmeta  {
      font-size: .8rem; color: var(--text-2);
      display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px;
    }
    .dbadges { display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0; align-items: flex-start; }

    .dcomm {
      font-size: .85rem; color: var(--text); background: #f8fafc;
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 9px 12px; margin: 8px 0; line-height: 1.5;
    }
    .dcomm.tech { background: #f0f9ff; border-color: #bae6fd; color: #0c4a6e; }

    /* Zone d'actions Atelier */
    .actions-mec {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border); align-items: center;
    }
    .input-tech {
      flex: 1; min-width: 160px; padding: 7px 11px;
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: .83rem; outline: none; transition: border-color .15s;
      min-height: 40px;
    }
    .input-tech:focus { border-color: var(--teal); }

    .btn-mec {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border: none; border-radius: var(--r-sm);
      font-size: .82rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap; min-height: 36px;
    }
    .btn-mec:hover  { opacity: .87; transform: translateY(-1px); }
    .btn-mec:active { transform: none; opacity: 1; }
    .btn-mec.repare  { background: var(--vert);   color: #fff; }
    .btn-mec.encours { background: var(--orange); color: #fff; }
    .btn-mec.piece   { background: var(--violet); color: #fff; }

    /* ═══════════════════════════════════════
       VUE RÉGULATEUR
    ═══════════════════════════════════════ */
    .barre-reg {
      display: flex; gap: 10px; margin-bottom: 22px;
      flex-wrap: wrap; align-items: center;
    }
    .barre-reg input {
      padding: 8px 12px; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); font-size: .85rem;
      background: #fff; width: 200px; outline: none;
      transition: border-color .15s; min-height: 40px;
    }
    .barre-reg input:focus { border-color: var(--teal); }

    /* Bouton CSV — teal = action secondaire */
    .btn-csv {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px; background: var(--teal); color: #fff;
      border: none; border-radius: var(--r-sm);
      font-size: .83rem; font-weight: 700; cursor: pointer;
      transition: background .15s; min-height: 40px;
    }
    .btn-csv:hover { background: var(--teal-dk); }

    /* Grille des bus */
    .grille-bus {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px; margin-bottom: 24px;
    }
    .bus-tuile {
      border-radius: var(--r-md); padding: 16px 8px; text-align: center;
      cursor: pointer; border: 2px solid transparent;
      transition: transform .12s, box-shadow .12s; user-select: none;
    }
    .bus-tuile:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.1); }
    .bus-tuile.sel   { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(45,47,126,.16); }
    .bus-tuile.vert  { background: #e8faf5; color: #15803d; }
    .bus-tuile.rouge { background: var(--rouge-lt); color: #b91c1c; }
    .bus-tuile.orange{ background: var(--orange-lt); color: #c2410c; }
    .bus-tuile .bi   { font-size: 1.5rem; display: block; margin-bottom: 5px; }
    .bus-tuile .bn   { font-size: 1rem; font-weight: 800; display: block; }
    .bus-tuile .bl   { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; display: block; margin-top: 3px; opacity: .8; }
    .bus-tuile .bnd  { font-size: .75rem; font-weight: 600; display: block; margin-top: 3px; }

    /* Panneau détail bus */
    .detail-bus {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 20px 22px;
      box-shadow: var(--shadow-md); margin-bottom: 24px;
    }
    .detail-head {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 14px;
      padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .detail-head h3 { font-size: 1.05rem; font-weight: 700; color: var(--navy); }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-att {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 16px; border: none; border-radius: var(--r-sm);
      font-size: .83rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s; min-height: 36px;
    }
    .btn-att:hover { opacity: .87; transform: translateY(-1px); }
    .btn-att.rouge { background: var(--rouge); color: #fff; }
    .btn-att.vert  { background: var(--vert);  color: #fff; }

    .btn-fermer {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 14px; border: 1.5px solid var(--border);
      background: #fff; border-radius: var(--r-sm);
      font-size: .83rem; font-weight: 600; cursor: pointer; color: var(--text-2);
      transition: all .15s; min-height: 36px;
    }
    .btn-fermer:hover { border-color: var(--navy); color: var(--navy); }

    /* Alerte récurrence */
    .alerte-rec {
      background: #fdf4ff; border: 1.5px solid #c4b5fd;
      border-radius: var(--r-sm); padding: 10px 14px;
      font-size: .84rem; color: #5b21b6; font-weight: 700;
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }

    /* Tableau historique */
    .tablo-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tablo { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .tablo th {
      text-align: left; padding: 9px 12px;
      background: #f8fafc; border-bottom: 2px solid var(--border);
      font-size: .72rem; font-weight: 700; color: var(--text-2);
      white-space: nowrap; text-transform: uppercase; letter-spacing: .05em;
    }
    .tablo td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .tablo tr:last-child td { border-bottom: none; }
    .tablo tr:hover td { background: #f8fafc; }

    /* ═══════════════════════════════════════
       TOAST & MODAL
    ═══════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #1a2234; color: #fff;
      padding: 11px 24px; border-radius: var(--r-md);
      font-size: .88rem; font-weight: 600; z-index: 999;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 28px rgba(0,0,0,.28);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.48);
      display: none; align-items: center; justify-content: center;
      z-index: 500; padding: 20px;
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    .overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: var(--r-lg); padding: 28px;
      max-width: 420px; width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,.22);
      animation: modalIn .2s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-ico { font-size: 2.4rem; margin-bottom: 10px; }
    .modal h3  { font-size: 1.05rem; font-weight: 700; color: #b91c1c; margin-bottom: 8px; }
    .modal p   { font-size: .88rem; color: var(--text-2); margin-bottom: 22px; line-height: 1.6; }
    .modal-btns{ display: flex; gap: 10px; justify-content: flex-end; }
    .btn-sec   {
      padding: 9px 18px; border: 1.5px solid var(--border);
      background: #fff; border-radius: var(--r-sm);
      font-size: .88rem; font-weight: 600; cursor: pointer; color: var(--text-2);
      transition: all .15s; min-height: 40px;
    }
    .btn-sec:hover { border-color: var(--navy); color: var(--navy); }
    .btn-danger {
      padding: 9px 18px; background: var(--rouge); color: #fff;
      border: none; border-radius: var(--r-sm);
      font-size: .88rem; font-weight: 700; cursor: pointer;
      transition: background .15s; min-height: 40px;
    }
    .btn-danger:hover { background: #b91c1c; }

    .vide { text-align: center; color: var(--text-3); padding: 48px 20px; font-size: .9rem; }
    .vide svg { display: block; margin: 0 auto 12px; opacity: .3; }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */

    /* Tablette : header reste sur une ligne, on réduit les espaces */
    @media (max-width: 860px) {
      header { gap: 0 10px; padding: 0 16px; }
      .champ-nom input { width: 110px; }
    }

    /* Mobile paysage / petite tablette */
    @media (max-width: 680px) {
      /* Header 2 lignes */
      header {
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
        padding: 8px 14px;
        gap: 6px 0;
        min-height: unset;
      }
      .logo-header { grid-column: 1; grid-row: 1; }
      .nav-roles   { grid-column: 2; grid-row: 1; justify-content: flex-end; }
      .header-mid  { grid-column: 1 / -1; grid-row: 2; justify-content: flex-start; padding-bottom: 4px; }

      /* Compteurs abrégés : cacher le texte, garder dot + chiffre */
      .cpt-txt    { display: none; }
      .cpt        { padding: 3px 8px; }

      /* Nav : cacher le texte, garder icône seulement */
      .nav-txt    { display: none; }
      .nav-roles button { padding: 7px 10px; gap: 0; }

      main { padding: 16px 14px; }
    }

    /* Mobile portrait */
    @media (max-width: 480px) {
      .filtres-bar input { width: 100%; }
      .filtres-bar { flex-direction: column; align-items: stretch; }
      .filtres-bar select { width: 100%; }

      /* Gravité : 3 colonnes → rester en 3, mais plus compact */
      .gravite-opts label { padding: 10px 4px; min-height: 70px; font-size: .72rem; }
      .grav-icon { font-size: 1.4rem; }

      /* Actions Atelier : input pleine largeur d'abord */
      .actions-mec { flex-direction: column; align-items: stretch; }
      .input-tech  { min-width: unset; }
      .btn-mec     { justify-content: center; }

      /* Grille bus plus petite */
      .grille-bus { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    }

    /* Très petit écran */
    @media (max-width: 360px) {
      .gravite-opts { grid-template-columns: 1fr; }
      .nav-roles button { padding: 6px 8px; }
    }
  </style>
</head>

<main>

  <!-- ══════════════ VUE CHAUFFEUR ══════════════ -->
  <section id="vue-chauffeur" class="vue active">
    <p class="section-titre">Déclarer un défaut</p>

  <!-- ══════════════ VUE ATELIER ══════════════ -->
  <section id="vue-mecano" class="vue">
    <p class="section-titre">File des défauts</p>
    <div class="filtres-bar">

        Exporter CSV
      </button>
    </div>
    <div class="grille-bus" id="grille-bus"></div>
    <div id="detail-bus"></div>

<script>
/* ════════════════════════════════════════════════════════════════
   SCHÉMA INDEXEDDB  ningbus-defauts-v1
   ────────────────────────────────────────────────────────────────
   Store « defauts » — clé primaire : id (auto-incrément)
   Index : numeroParcBus · statut · gravite · horodatage

   Champs :
     id              number   clé primaire
     numeroParcBus   string   n° de bus (ex. "2341")
     typeDefaut      string   Clim | Freins | … | Autre
     detailAutre     string   libre si typeDefaut === "Autre"
     gravite         string   "bloquant" | "gênant" | "mineur"
     commentaire     string   note chauffeur
     horodatage      string   ISO 8601
     declarant       string   nom chauffeur
     statut          string   "ouvert" | "en_cours" | "piece_manquante" | "reparé"
     horodatageRep   string   ISO 8601, date de mise à jour mécano
     mecano          string   nom du mécano/atelier
     commentaireTech string   note technique atelier
     recurrent       boolean  vrai si même type sur même bus ≤ 14 j
════════════════════════════════════════════════════════════════ */

'use strict';

const DB_NOM   = 'ningbus-defauts-v1';
const DB_VER   = 1;
const STORE    = 'defauts';
const RECUR_MS = 14 * 24 * 60 * 60 * 1000; // 14 jours

let db;
let roleActif      = 'chauffeur';
let busSelectionne = null;
let pendingBus     = null;

/* ────────────────────────────────────────────────────────────────
   INDEXEDDB
──────────────────────────────────────────────────────────────── */
function ouvrirDB() {
  return new Promise((ok, ko) => {
    const req = indexedDB.open(DB_NOM, DB_VER);
    req.onupgradeneeded = e => {
      const base = e.target.result;
      if (!base.objectStoreNames.contains(STORE)) {
        const s = base.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        s.createIndex('numeroParcBus', 'numeroParcBus', { unique: false });
        s.createIndex('statut',        'statut',        { unique: false });
        s.createIndex('gravite',       'gravite',       { unique: false });
        s.createIndex('horodatage',    'horodatage',    { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; ok(db); };
    req.onerror   = e => ko(e.target.error);
  });
}

const tx = (mode = 'readonly') => db.transaction(STORE, mode).objectStore(STORE);
const ajouterDefaut = d  => new Promise((ok, ko) => { const r = tx('readwrite').add(d);  r.onsuccess = e => ok(e.target.result); r.onerror = e => ko(e.target.error); });
const majDefaut     = d  => new Promise((ok, ko) => { const r = tx('readwrite').put(d);  r.onsuccess = () => ok();               r.onerror = e => ko(e.target.error); });
const tousDefauts   = () => new Promise((ok, ko) => { const r = tx().getAll();           r.onsuccess = e => ok(e.target.result); r.onerror = e => ko(e.target.error); });

/* ────────────────────────────────────────────────────────────────
   LOGIQUE MÉTIER
──────────────────────────────────────────────────────────────── */
function estRecurrent(d, liste) {
  const t = new Date(d.horodatage).getTime();
  return liste.some(x =>
    x.id !== d.id &&
    x.numeroParcBus === d.numeroParcBus &&
    x.typeDefaut    === d.typeDefaut &&
    Math.abs(t - new Date(x.horodatage).getTime()) <= RECUR_MS
  );
}

function couleurBus(defs) {
  const actifs = defs.filter(d => d.statut !== 'reparé');
  if (actifs.some(d => d.gravite === 'bloquant')) return 'rouge';
  if (actifs.length > 0)                          return 'orange';
  return 'vert';
}

function trierDefauts(liste) {
  const p = { bloquant: 0, 'gênant': 1, mineur: 2 };
  return [...liste].sort((a, b) => {
    const dg = (p[a.gravite] ?? 9) - (p[b.gravite] ?? 9);
    return dg !== 0 ? dg : new Date(a.horodatage) - new Date(b.horodatage);
  });
}

/* ────────────────────────────────────────────────────────────────
   NOM UTILISATEUR
──────────────────────────────────────────────────────────────── */
function obtenirNom() { return document.getElementById('input-nom').value.trim(); }

function sauvegarderNom() {
  localStorage.setItem('ratp-nom-' + roleActif, obtenirNom());
  document.getElementById('apercu-nom').textContent = obtenirNom() || '—';
}

function chargerNom(role) {
  document.getElementById('input-nom').value = localStorage.getItem('ratp-nom-' + role) || '';
  document.getElementById('apercu-nom').textContent = obtenirNom() || '—';
}

/* ────────────────────────────────────────────────────────────────
   NAVIGATION RÔLES
──────────────────────────────────────────────────────────────── */
function changerRole(role) {
  roleActif = role;
  document.querySelectorAll('.nav-roles button').forEach(b =>
    b.classList.toggle('actif', b.dataset.role === role));
  document.querySelectorAll('.vue').forEach(v => v.classList.remove('active'));
  document.getElementById('vue-' + role).classList.add('active');
  chargerNom(role);
  if (role === 'mecano')     rendreDefauts();
  if (role === 'regulateur') rendreGrille();
}

/* ────────────────────────────────────────────────────────────────
   VUE CHAUFFEUR
──────────────────────────────────────────────────────────────── */
function toggleAutre() {
  const val   = document.getElementById('type-defaut').value;
  const grp   = document.getElementById('fg-autre');
  const input = document.getElementById('detail-autre');
  const show  = val === 'Autre';
  grp.style.display = show ? 'block' : 'none';
  input.required    = show;
  if (!show) input.value = '';
}

async function soumettreDefaut(e) {
  e.preventDefault();
  cacherAlerte('alerte-ch');

  const nom     = obtenirNom();
  const numBus  = document.getElementById('num-bus').value.trim().toUpperCase();
  const type    = document.getElementById('type-defaut').value;
  const detail  = document.getElementById('detail-autre').value.trim();
  const gravite = document.querySelector('input[name="gravite"]:checked')?.value;
  const comm    = document.getElementById('comm-ch').value.trim();

  if (!nom)    { afficherAlerte('alerte-ch', '⚠️ Saisissez votre nom en haut de page.', 'erreur'); return; }
  if (!numBus) { afficherAlerte('alerte-ch', '⚠️ Le n° de bus est obligatoire.', 'erreur'); return; }
  if (!type)   { afficherAlerte('alerte-ch', '⚠️ Sélectionnez un type de défaut.', 'erreur'); return; }
  if (type === 'Autre' && !detail) { afficherAlerte('alerte-ch', '⚠️ Précisez le défaut.', 'erreur'); return; }
  if (!gravite){ afficherAlerte('alerte-ch', '⚠️ Sélectionnez un niveau de gravité.', 'erreur'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  try {
    const liste  = await tousDefauts();
    const defaut = {
      numeroParcBus: numBus, typeDefaut: type, detailAutre: detail,
      gravite, commentaire: comm, horodatage: new Date().toISOString(),
      declarant: nom, statut: 'ouvert',
      horodatageRep: null, mecano: null, commentaireTech: null, recurrent: false,
    };
    defaut.recurrent = estRecurrent(defaut, liste);
    await ajouterDefaut(defaut);
    document.getElementById('form-defaut').reset();
    toggleAutre();
    await majCompteurs();
    const msg = defaut.recurrent
      ? `✅ Défaut enregistré. <strong>⚠️ Défaut récurrent sur le bus ${esc(numBus)}.</strong>`
      : `✅ Défaut enregistré sur le bus <strong>${esc(numBus)}</strong>.`;
    afficherAlerte('alerte-ch', msg, 'succes');
  } catch (err) {
    afficherAlerte('alerte-ch', '❌ Erreur : ' + err.message, 'erreur');
  } finally {
    btn.disabled = false;
  }
}

/* ────────────────────────────────────────────────────────────────
   VUE ATELIER
──────────────────────────────────────────────────────────────── */
async function rendreDefauts() {
  const fBus  = document.getElementById('f-bus-mec').value.trim().toUpperCase();
  const fStat = document.getElementById('f-statut').value;
  const fGrav = document.getElementById('f-gravite').value;

  let liste = await tousDefauts();
  if (fBus)  liste = liste.filter(d => d.numeroParcBus.includes(fBus));
  if (fStat) liste = liste.filter(d => d.statut === fStat);
  if (fGrav) liste = liste.filter(d => d.gravite === fGrav);

  const actifs  = trierDefauts(liste.filter(d => d.statut !== 'reparé'));
  const repares = liste.filter(d => d.statut === 'reparé')
                       .sort((a, b) => new Date(b.horodatageRep) - new Date(a.horodatageRep));

  const ct = document.getElementById('liste-mec');
  if (liste.length === 0) {
    ct.innerHTML = `<div class="vide">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
      Aucun défaut trouvé.
    </div>`;
    return;
  }
  ct.innerHTML = [...actifs, ...repares].map(htmlDefaut).join('');
}

function htmlDefaut(d) {
  const typeLabel = d.typeDefaut === 'Autre' && d.detailAutre
    ? `Autre : ${esc(d.detailAutre)}` : esc(d.typeDefaut);

  const bRec  = d.recurrent ? `<span class="badge recurrent">♻ Récurrent</span>` : '';
  const commC = d.commentaire    ? `<div class="dcomm">💬 ${esc(d.commentaire)}</div>` : '';
  const commT = d.commentaireTech
    ? `<div class="dcomm tech">🔧 ${esc(d.commentaireTech)} — <em>${esc(d.mecano||'')}</em></div>` : '';

  const actions = d.statut !== 'reparé' ? `
    <div class="actions-mec">
      <input class="input-tech" type="text" id="tech-${d.id}"
             placeholder="Commentaire technique…" maxlength="200"
             value="${esc(d.commentaireTech||'')}">
      <button class="btn-mec repare"  onclick="majStatut(${d.id},'reparé')">✅ Réparé</button>
      <button class="btn-mec encours" onclick="majStatut(${d.id},'en_cours')">🔧 En cours</button>
      <button class="btn-mec piece"   onclick="majStatut(${d.id},'piece_manquante')">⏳ Pièce manquante</button>
    </div>` : '';

  return `
    <div class="dcard ${d.gravite}">
      <div class="dhead">
        <div>
          <span class="dbus">Bus ${esc(d.numeroParcBus)}</span>
          <div class="dtitle">${typeLabel}</div>
          <div class="dmeta">
            <span>📅 ${fmtDate(d.horodatage)}</span>
            <span>👤 ${esc(d.declarant)}</span>
          </div>
        </div>
        <div class="dbadges">
          <span class="badge ${d.gravite}">${iconeGrav(d.gravite)} ${cap(d.gravite)}</span>
          <span class="badge s-${d.statut==='piece_manquante'?'piece':d.statut}">${labelStatut(d.statut)}</span>
          ${bRec}
        </div>
      </div>
      ${commC}${commT}${actions}
    </div>`;
}

async function majStatut(id, nvStatut) {
  const nom = obtenirNom();
  if (!nom) { toast('⚠️ Saisissez votre nom en haut de page.'); return; }
  const liste  = await tousDefauts();
  const defaut = liste.find(d => d.id === id);
  if (!defaut) return;
  const it = document.getElementById('tech-' + id);
  defaut.statut        = nvStatut;
  defaut.horodatageRep = new Date().toISOString();
  defaut.mecano        = nom;
  if (it?.value.trim()) defaut.commentaireTech = it.value.trim();
  await majDefaut(defaut);
  const labels = { reparé:'Réparé ✅', en_cours:'En cours 🔧', piece_manquante:'Pièce manquante ⏳' };
  toast(labels[nvStatut] || nvStatut);
  await rendreDefauts();
  await majCompteurs();
}

/* ────────────────────────────────────────────────────────────────
   VUE RÉGULATEUR
──────────────────────────────────────────────────────────────── */
async function rendreGrille() {
  const filtre = document.getElementById('f-bus-reg').value.trim().toUpperCase();
  const liste  = await tousDefauts();
  let buses    = [...new Set(liste.map(d => d.numeroParcBus))].sort();
  if (filtre)  buses = buses.filter(b => b.includes(filtre));

  const grille = document.getElementById('grille-bus');
  if (buses.length === 0) {
    grille.innerHTML = `<div class="vide" style="grid-column:1/-1">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      Aucun bus enregistré.
    </div>`;
    document.getElementById('detail-bus').innerHTML = '';
    return;
  }

  const ico    = { vert:'🟢', rouge:'🔴', orange:'🟠' };
  const labels = { vert:'Disponible', rouge:'Bloquant', orange:'Surveiller' };

  grille.innerHTML = buses.map(num => {
    const db  = liste.filter(d => d.numeroParcBus === num);
    const c   = couleurBus(db);
    const nb  = db.filter(d => d.statut !== 'reparé').length;
    const sel = busSelectionne === num ? ' sel' : '';
    return `<div class="bus-tuile ${c}${sel}" onclick="selectionnerBus('${esc(num)}')">
      <span class="bi">${ico[c]}</span>
      <span class="bn">${esc(num)}</span>
      <span class="bl">${labels[c]}</span>
      <span class="bnd">${nb > 0 ? nb+' défaut'+(nb>1?'s':'') : '✓ OK'}</span>
    </div>`;
  }).join('');

  if (busSelectionne) rendreDetailBus(liste);
}

async function selectionnerBus(num) {
  busSelectionne = num;
  await rendreGrille();
}

function rendreDetailBus(liste) {
  if (!busSelectionne) return;
  const db     = liste.filter(d => d.numeroParcBus === busSelectionne);
  const coul   = couleurBus(db);
  const actifs = db.filter(d => d.statut !== 'reparé');
  const histo  = [...db].sort((a,b) => new Date(b.horodatage) - new Date(a.horodatage));

  const recTypes = [...new Set(db.filter(d => d.recurrent).map(d => d.typeDefaut))];
  const alerteRec = recTypes.length
    ? `<div class="alerte-rec">♻ Défauts récurrents : ${recTypes.map(esc).join(', ')}</div>` : '';

  const btnAtt = coul === 'rouge'
    ? `<button class="btn-att rouge" onclick="demanderConfirmation('${esc(busSelectionne)}')">🚨 Attribuer</button>`
    : `<button class="btn-att vert"  onclick="toast('Bus ${esc(busSelectionne)} attribué ✓')">✅ Attribuer</button>`;

  const lignes = histo.map(d => {
    const tl  = d.typeDefaut==='Autre'&&d.detailAutre ? `Autre : ${esc(d.detailAutre)}` : esc(d.typeDefaut);
    const rec = d.recurrent ? `<span class="badge recurrent" style="margin-left:4px">♻</span>` : '';
    return `<tr>
      <td>${fmtDate(d.horodatage)}</td>
      <td>${tl}${rec}</td>
      <td><span class="badge ${d.gravite}">${iconeGrav(d.gravite)} ${cap(d.gravite)}</span></td>
      <td><span class="badge s-${d.statut==='piece_manquante'?'piece':d.statut}">${labelStatut(d.statut)}</span></td>
      <td>${esc(d.declarant)}</td>
      <td>${d.mecano?esc(d.mecano):'<span style="color:var(--text-3)">—</span>'}</td>
    </tr>`;
  }).join('');

  const etatActif = actifs.length === 0
    ? `<p style="color:var(--vert);font-weight:700;margin-bottom:14px">✓ Aucun défaut actif</p>`
    : `<p style="font-weight:700;margin-bottom:12px">${actifs.length} défaut${actifs.length>1?'s':''} actif${actifs.length>1?'s':''}</p>`;

  document.getElementById('detail-bus').innerHTML = `
    <div class="detail-bus">
      <div class="detail-head">
        <h3>🚌 Bus ${esc(busSelectionne)}</h3>
        <div class="detail-actions">
          ${btnAtt}
          <button class="btn-fermer" onclick="fermerDetail()">✕ Fermer</button>
        </div>
      </div>
      ${alerteRec}
      ${etatActif}
      ${histo.length > 0 ? `
        <div class="tablo-wrap">
          <table class="tablo">
            <thead><tr>
              <th>Date</th><th>Type</th><th>Gravité</th><th>Statut</th><th>Déclarant</th><th>Atelier</th>
            </tr></thead>
            <tbody>${lignes}</tbody>
          </table>
        </div>` : '<div class="vide">Aucun historique.</div>'}
    </div>`;
}

function fermerDetail() {
  busSelectionne = null;
  document.getElementById('detail-bus').innerHTML = '';
  rendreGrille();
}

/* ────────────────────────────────────────────────────────────────
   MODAL (bus ROUGE)
──────────────────────────────────────────────────────────────── */
function demanderConfirmation(num) {
  document.getElementById('modal-texte').textContent =
    `Le bus ${num} a un défaut bloquant non résolu. L'attribuer peut mettre les passagers en danger. Confirmez-vous ?`;
  pendingBus = num;
  document.getElementById('modal-rouge').classList.add('show');
}
function fermerModal() {
  document.getElementById('modal-rouge').classList.remove('show');
  pendingBus = null;
}
function confirmerAttribution() {
  fermerModal();
  if (pendingBus) toast(`⚠️ Bus ${pendingBus} attribué malgré le défaut bloquant`);
}

/* ────────────────────────────────────────────────────────────────
   COMPTEURS EN-TÊTE
──────────────────────────────────────────────────────────────── */
async function majCompteurs() {
  const liste = await tousDefauts();
  const buses = [...new Set(liste.map(d => d.numeroParcBus))];
  let dispo = 0, bloques = 0, enRep = 0;
  buses.forEach(num => {
    const c = couleurBus(liste.filter(d => d.numeroParcBus === num));
    if (c === 'vert')   dispo++;
    if (c === 'rouge')  bloques++;
    if (c === 'orange') enRep++;
  });
  document.getElementById('cpt-dispo-txt').textContent  = dispo;
  document.getElementById('cpt-bloque-txt').textContent = bloques;
  document.getElementById('cpt-repair-txt').textContent = enRep;
}

/* ────────────────────────────────────────────────────────────────
   EXPORT CSV
──────────────────────────────────────────────────────────────── */
async function exporterCSV() {
  const liste = await tousDefauts();
  if (!liste.length) { toast('Aucun défaut à exporter.'); return; }
  const ent  = ['ID','Bus','Type','Détail Autre','Gravité','Commentaire',
                'Date déclaration','Déclarant','Statut','Date MAJ','Atelier',
                'Commentaire technique','Récurrent'];
  const rows = liste.map(d => [
    d.id, d.numeroParcBus, d.typeDefaut, d.detailAutre||'', d.gravite,
    d.commentaire||'', d.horodatage, d.declarant, d.statut,
    d.horodatageRep||'', d.mecano||'', d.commentaireTech||'',
    d.recurrent?'oui':'non',
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv  = [ent.join(','), ...rows].join('\r\n');
  const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), {
    href: url,
    download: `ratp-defauts-${new Date().toISOString().slice(0,10)}.csv`,
  }).click();
  URL.revokeObjectURL(url);
  toast('Export CSV téléchargé ✓');
}

/* ────────────────────────────────────────────────────────────────
   UTILITAIRES
──────────────────────────────────────────────────────────────── */
function afficherAlerte(id, html, type) {
  const el = document.getElementById(id);
  el.innerHTML = html; el.className = 'alerte ' + type;
}
function cacherAlerte(id) { document.getElementById(id).className = 'alerte hidden'; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

/* Échappement XSS */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('fr-FR',{
    day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
}
function cap(s)       { return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function iconeGrav(g) { return {bloquant:'🔴','gênant':'🟠',mineur:'🟡'}[g]||''; }
function labelStatut(s) {
  return {ouvert:'🔴 Ouvert',en_cours:'🔧 En cours',reparé:'✅ Réparé',piece_manquante:'⏳ Pièce manquante'}[s]||s;
}

/* ────────────────────────────────────────────────────────────────
   INITIALISATION
──────────────────────────────────────────────────────────────── */
setInterval(() => {
  document.getElementById('apercu-date').textContent = new Date().toLocaleString('fr-FR');
}, 1000);

async function init() {
  await ouvrirDB();
  chargerNom('chauffeur');
  document.getElementById('apercu-date').textContent = new Date().toLocaleString('fr-FR');
  await majCompteurs();
}

init().catch(err => console.error('Init erreur :', err));
</script>
