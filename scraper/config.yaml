# TrendTrack — niches to track automatically (cron job)
country: "FR"

niches:
  - "foot wellness"
  - "posture corrector"
  - "sleep supplement"
  - "hair loss"
  - "joint pain"
  - "weight loss"
  - "gut health"
  - "collagen"
  - "anti aging"
  - "teeth whitening"

# Max ads to scrape per niche per run (pragmatic limit)
max_ads_per_niche: 100

# Groq model to use for angle analysis (free)
# Options: llama-3.1-70b-versatile | llama-3.3-70b-versatile | mixtral-8x7b-32768
groq_model: "llama-3.1-70b-versatile"

# Angle gap thresholds
gap_usage_threshold: 0.10       # < 10% market share
gap_viability_threshold: 60.0   # avg_days > 60
